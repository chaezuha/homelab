name: allofcreate 
services:
  mc:
    image: itzg/minecraft-server
    pull_policy: daily
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      ENFORCE_SECURE_PROFILE: "FALSE"
      MEMORY: "8G"
      USE_AIKAR_FLAGS: "true"
      MAX_TICK_TIME: -1
      DIFFICULTY: "hard"
      MOTD: "Fight On!"
      VIEW_DISTANCE: 10
      SIMULATION_DISTANCE: 8
      TYPE: "AUTO_CURSEFORGE"
      CF_SLUG: "all-of-create-aeronautics"
      CF_API_KEY: "${CF_API_KEY}"
      MODRINTH_PROJECTS: "chunky"
    volumes:
      - ./data:/data
    restart: unless-stopped
