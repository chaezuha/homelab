name: mc-nightfallcraft-1

services:
  mc:
    image: itzg/minecraft-server:java17
    pull_policy: daily
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      ENFORCE_SECURE_PROFILE: "FALSE"
      MEMORY: "8G"
      USE_AIKAR_FLAGS: "true"
      MAX_TICK_TIME: -1
      DIFFICULTY: "hard"
      MOTD: "Fight On!"
      VIEW_DISTANCE: 10
      SIMULATION_DISTANCE: 8
      TYPE: "CURSEFORGE"
      CF_SERVER_MOD: "https://www.curseforge.com/api/v1/mods/1354886/files/8127625/download"    
    volumes:
      - ./data:/data
    restart: unless-stopped
