name: nextcloud

services:
  db:
    image: mariadb:lts
    restart: always
    command: --transaction-isolation=READ-COMMITTED
    volumes:
      - ./data/db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${SQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${SQL_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud

  redis:
    image: redis:alpine
    restart: always

  cron:
    image: nextcloud
    restart: unless-stopped
    volumes:
      - ./data/nextcloud:/var/www/html
    entrypoint: /cron.sh
    depends_on: 
      - app

  caddy:
    image: caddy:latest
    restart: always
    network_mode: host
    volumes:
      - ./data/Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy:/data
  
  app:
    image: nextcloud
    restart: always
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - redis
      - db
    volumes:
      - ./data/nextcloud:/var/www/html
      - /srv/filen-archive:/mnt/filen-archive:ro
      - ./data/caddy-root.crt:/usr/local/share/ca-certificates/caddy-root.crt:ro
    environment:
      - MYSQL_PASSWORD=${SQL_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=db
      - REDIS_HOST=redis
