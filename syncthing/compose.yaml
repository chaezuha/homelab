name: syncthing

services:
  syncthing:
    image: syncthing/syncthing
    container_name: syncthing
    hostname: my-syncthing
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./data:/var/syncthing
    ports:
      - 8384:8384    # Web UI
      - 22000:22000/tcp  # Sync traffic
      - 22000:22000/udp
      - 21027:21027/udp  # Discovery
    restart: unless-stopped
